<html>
<head>
    <title>Subject Selection</title>
</head>
<body>
    <h2>subject selection</h2>
    <p>current subject: <b>{{SAVED_SUBJECT}}</b></p>

        <input type="radio" name="subject" value="Biology"> Biology<br><br>
        <input type="submit" value="submit">
    </form>
</body>
</html>
